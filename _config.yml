title: hajongon
email: hajongon@gmail.com
description: >-
  코드 치려고 키보드 사놓고 마우스로 검색만 합니다.
# baseurl: "/" # the subpath of your site, e.g. /blog
url: "http://hajongon.github.io" # the base hostname & protocol for your site, e.g. http://example.com
github_username: hajongon
highlighter: rouge
svg:
  optimize: true
# Build settings
# theme: minima
highlighter-theme: monokai
date_format: "%Y-%M-%D"

category_dir: category/
tag_dir: tag/

# 추가
gem "sass": true
future: true



